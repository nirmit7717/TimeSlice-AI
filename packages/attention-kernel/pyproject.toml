[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "timeslice-attention-kernel"
version = "0.1.0"
description = "LangGraph AI Agentic Attention Kernel and Nvidia NIM integration for TimeSlice AI"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "langgraph>=0.1.0",
    "langchain-core>=0.2.0",
    "langchain-openai>=0.1.0"
]

[project.optional-dependencies]
test = [
    "pytest>=7.0.0"
]
