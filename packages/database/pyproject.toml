[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "timeslice-database"
version = "0.1.0"
description = "Local relational persistence and vector store package for TimeSlice AI"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "sqlalchemy>=2.0.0",
    "alembic>=1.10.0"
]

[project.optional-dependencies]
test = [
    "pytest>=7.0.0"
]
