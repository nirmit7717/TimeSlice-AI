[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "timeslice-scheduling"
version = "0.1.0"
description = "Core deterministic scheduling engine for TimeSlice AI"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0"
]

[project.optional-dependencies]
test = [
    "pytest>=7.0.0"
]
