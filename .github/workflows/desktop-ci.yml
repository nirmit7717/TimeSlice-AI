name: TimeSlice Desktop CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon / Intel
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # Linux
            args: ''
          - platform: 'windows-latest' # Windows MSI/NSIS
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      # 1. Checkout repository
      - name: Checkout Source Code
        uses: actions/checkout@v3

      # 2. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'apps/desktop/package-lock.json'

      # 3. Set up Rust toolchain
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # 4. Cache Cargo registry & build cache
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      # 5. Install system packages for Linux
      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 6. Install npm packages
      - name: Install Desktop App Dependencies
        run: |
          cd apps/desktop
          npm ci

      # 7. Run compilation and Tauri packaging action
      - name: Build Tauri Desktop Package
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: timeslice-v__VERSION__
          releaseName: 'TimeSlice v__VERSION__'
          releaseBody: 'Release generated by GitHub Actions CI.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: './apps/desktop'
