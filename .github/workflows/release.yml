name: TimeSlice Production Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 1. Checkout repository
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # 2. Configure Python environment
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    # 3. Install core packages and test requirements
    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn sqlalchemy pyjwt[crypto] requests google-auth google-api-python-client langgraph langchain-core langchain-openai pytest pydantic chromadb apscheduler python-jose passlib bcrypt plyer ruff

    # 4. Execute full test suite to guarantee production quality
    - name: Run Full Test Suite
      env:
        PYTHONPATH: "apps/backend:packages/database:packages/scheduling-system:packages/platform:packages/attention-kernel:packages/adaptive-intelligence:packages/notification-system:packages/analytics-system:packages/execution-system:packages/context-vault"
      run: |
        python -m pytest packages/database/tests/
        python -m pytest packages/scheduling-system/tests/
        python -m pytest packages/platform/tests/
        python -m pytest packages/attention-kernel/tests/
        python -m pytest packages/adaptive-intelligence/tests/
        python -m pytest packages/notification-system/tests/
        python -m pytest packages/analytics-system/tests/
        python -m pytest packages/execution-system/tests/
        python -m pytest packages/context-vault/tests/
        python -m pytest apps/backend/tests/

    # 5. Create GitHub Release
    - name: Create GitHub Release Draft
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        draft: true
        prerelease: false
        generate_release_notes: true
        name: "TimeSlice AI Production Release ${{ github.ref_name }}"
